name: Paper Trader — Intraday Trade Execution

on:
  schedule:
    # 3 daily runs at CDT (UTC-5) target times, Mon-Fri.
    # All three are within NYSE market hours in both CDT and CST seasons.
    # market_hours.py gates all runs against NYSE hours (9:30 AM–4:00 PM ET).
    - cron: '30 14 * * 1-5'   # 09:30 AM CDT / 08:30 AM CST (= 09:30 AM EST, market open)
    - cron: '30 16 * * 1-5'   # 11:30 AM CDT / 10:30 AM CST
    - cron: '0  19 * * 1-5'   # 02:00 PM CDT / 01:00 PM CST
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if market is closed'
        required: false
        default: 'true'

concurrency:
  group: paper-trader
  cancel-in-progress: false   # let the running job finish; queue the next

jobs:
  run:
    name: Run Paper Trader Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run Paper Trader (monitor positions → book P&L → execute new buys)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ARTIFACTS_PATH: ${{ secrets.ARTIFACTS_PATH }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: python -m agents.paper_trader.run_paper_trader scheduler
