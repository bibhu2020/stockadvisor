name: Paper Trader — Intraday Trade Execution

on:
  schedule:
    # 3 daily runs at CST (UTC-6) target times, Mon-Fri.
    # In CDT/summer (UTC-5) these fire 1 hour later in local time:
    #   09:30 CST → 10:30 CDT (still within market hours ✓)
    #   12:30 CST → 01:30 CDT (still within market hours ✓)
    #   02:45 CST → 03:45 CDT → 20:45 UTC fires at 4:45 PM EDT (after NYSE close;
    #               market_hours.py blocks execution — effectively 2 runs in summer)
    # market_hours.py gates all runs against NYSE hours (9:30 AM–4:00 PM ET).
    - cron: '30 15 * * 1-5'   # 09:30 AM CST / 10:30 AM CDT
    - cron: '30 18 * * 1-5'   # 12:30 PM CST / 01:30 PM CDT
    - cron: '45 20 * * 1-5'   # 02:45 PM CST / blocked after close in CDT
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if market is closed'
        required: false
        default: 'true'

concurrency:
  group: paper-trader
  cancel-in-progress: false   # let the running job finish; queue the next

jobs:
  run:
    name: Run Paper Trader Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run Paper Trader (monitor positions → book P&L → execute new buys)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ARTIFACTS_PATH: ${{ secrets.ARTIFACTS_PATH }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: python -m agents.paper_trader.run_paper_trader scheduler
