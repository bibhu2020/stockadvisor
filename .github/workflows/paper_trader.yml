name: Paper Trader — Intraday Trade Execution

on:
  schedule:
    # Every 30 minutes during NYSE market hours, Mon-Fri
    # NYSE: 9:30 AM–4:00 PM ET | EDT (summer) = UTC-4 | EST (winter) = UTC-5
    # Window 13:30–21:00 UTC covers both seasons; market_hours.py gates actual execution
    - cron: '30 13 * * 1-5'
    - cron: '0,30 14 * * 1-5'
    - cron: '0,30 15 * * 1-5'
    - cron: '0,30 16 * * 1-5'
    - cron: '0,30 17 * * 1-5'
    - cron: '0,30 18 * * 1-5'
    - cron: '0,30 19 * * 1-5'
    - cron: '0,30 20 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if market is closed'
        required: false
        default: 'true'

concurrency:
  group: paper-trader
  cancel-in-progress: false   # let the running job finish; queue the next

jobs:
  run:
    name: Run Paper Trader Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run Paper Trader (monitor positions → book P&L → execute new buys)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ARTIFACTS_PATH: ${{ secrets.ARTIFACTS_PATH }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: python -m agents.paper_trader.run_paper_trader scheduler
