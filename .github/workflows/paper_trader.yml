name: Paper Trader — Intraday Trade Execution

on:
  schedule:
    # 10:00 AM CST (UTC-6) = 16:00 UTC, Mon-Fri
    - cron: '0 16 * * 1-5'
    # 12:00 PM CST (UTC-6) = 18:00 UTC, Mon-Fri
    - cron: '0 18 * * 1-5'
    # 2:45 PM CST (UTC-6) = 20:45 UTC, Mon-Fri
    - cron: '45 20 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if market is closed'
        required: false
        default: 'true'

jobs:
  run:
    name: Run Paper Trader Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run Paper Trader (monitor positions → book P&L → execute new buys)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ARTIFACTS_PATH: ${{ secrets.ARTIFACTS_PATH }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: python -m agents.paper_trader.run_paper_trader scheduler
