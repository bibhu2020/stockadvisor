name: Retrospective Analyst — Monthly Strategy Review

on:
  schedule:
    # Last Sunday of month 11:00 PM CST (UTC-6) = Monday 5:00 AM UTC
    # Python script checks internally if it's the last Sunday of the month
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if not last Sunday of month'
        required: false
        default: 'true'

jobs:
  run:
    name: Run Retrospective Analyst Agent
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run Retrospective Analyst (P&L vs SPY → pattern analysis → strategy evolution → PDF report)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ARTIFACTS_PATH: ${{ secrets.ARTIFACTS_PATH }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: python -m agents.retrospective.run_retrospective --triggered-by ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduler' }}
