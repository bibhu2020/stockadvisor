name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push code to HuggingFace Space (triggers Docker rebuild)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add hf https://mishrabp:${HF_TOKEN}@huggingface.co/spaces/mishrabp/stockadvisor
          git push hf main:main --force
