name: Market Analyst — Daily Stock Research

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if market is closed'
        required: false
        default: 'true'
      triggered_by:
        description: 'Who triggered this run (scheduled or manual)'
        required: false
        default: 'scheduled'

jobs:
  run:
    name: Run Market Analyst Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run Market Analyst (trend detection → fundamentals → technicals → sentiment → top 5 picks)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ARTIFACTS_PATH: ${{ secrets.ARTIFACTS_PATH }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: python -m agents.market_analyst.run_market_analyst ${{ github.event.inputs.triggered_by || 'scheduled' }}
