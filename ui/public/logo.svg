<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Icon box -->
  <rect width="48" height="48" rx="11" fill="url(#iconBg)"/>
  <!-- Stylised A legs -->
  <line x1="13" y1="38" x2="24" y2="13" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="24" y1="13" x2="35" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="18" y1="28" x2="30" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Gold apex dot + upward arrow -->
  <circle cx="24" cy="13" r="3.5" fill="#f59e0b"/>
  <line x1="24" y1="9" x2="24" y2="5" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="24,2 21,7 27,7" fill="#f59e0b"/>

  <!-- Wordmark -->
  <text x="58" y="19" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="800" fill="#1e3a5f" letter-spacing="-0.3">Alpha</text>
  <text x="58" y="37" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="400" fill="#64748b" letter-spacing="1.5">FORGE</text>
  <!-- Tagline -->
  <text x="59" y="47" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="6.5" fill="#94a3b8" letter-spacing="0.3">AI-Powered Trading Intelligence</text>
</svg>
